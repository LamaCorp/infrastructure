---
nft_define_host:
  bgp interfaces:
    name: bgp_interfaces
    value: "{core-bar, core-pvl, core-fra}"
  ospf interfaces:
    name: ospf_interfaces
    value: "{lan-svc-101, core-bar, core-pvl, core-fra}"

nft_input_host_rules:
  500 k3s api:
    - tcp dport 6443 accept

nft__nat_host_postrouting_rules:
  100 external connectivity:
    - meta oif ul-hetzner-0 ip saddr 172.28.0.0/16 ip saddr != {136.243.102.29, 148.251.148.232/29} counter snat to 148.251.148.239
    - meta oif ul-hetzner-0 ip saddr != {136.243.102.29, 148.251.148.232/29} counter snat to 136.243.102.29
    - meta iif lan-svc-101 oifname {core-bar, core-pvl, core-fra} ip saddr != 209.112.97.0/24 ip daddr != {209.112.97.0/24, 172.28.0.0/16, 172.29.0.0/16} counter snat to 209.112.97.232
    - meta iif lan-mdw-102 oifname {core-bar, core-pvl, core-fra} ip saddr != 209.112.97.0/24 ip daddr != {209.112.97.0/24, 172.28.0.0/16, 172.29.0.0/16} counter snat to 209.112.97.233
    - meta iif cl-vm-0 oifname {core-bar, core-pvl, core-fra} ip saddr != 209.112.97.0/24 ip daddr != {209.112.97.0/24, 172.28.0.0/16, 172.29.0.0/16} counter snat to 209.112.97.234
    # TODO: drop these
    - meta oifname {core-bar, core-pvl, core-fra} ip saddr != 209.112.97.0/24 ip daddr != {209.112.97.0/24, 172.28.0.0/16, 172.29.0.0/16} counter masquerade
