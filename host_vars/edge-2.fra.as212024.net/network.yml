---
systemd_networkd_link:
  10-ul-sbag-0:
    Match:
      MACAddress: 0a:ff:c2:32:5c:a5
    Link:
      Name: ul-sbag-0
  10-ix-decix-0:
    Match:
      MACAddress: c0:03:c2:32:5c:a5
    Link:
      Name: ix-decix-0
  10-ix-sbix-1:
    Match:
      MACAddress: 00:50:56:9e:01:7a
    Link:
      Name: ix-sbix-1

systemd_networkd_netdev:
  10-id:
    NetDev:
      Name: id
      Kind: dummy
  # core VPN
  15-core-fsn:
    NetDev:
      Name: core-fsn
      Kind: wireguard
    WireGuard:
      PrivateKeyFile: /etc/wireguard/core/private
      ListenPort: 51801
      RouteTable: "off"
    WireGuardPeer:
      PublicKey: "{{ lookup('ansible.builtin.file', '/tmp/ansible/nucleus.fsn.as212024.net/etc/wireguard/core/public') }}"
      AllowedIPs:
        - 0.0.0.0/0
        - "::/0"
      PersistentKeepalive: 60
      Endpoint: "[2a01:4f8:171:b0d::1]:51804"
  15-core-bar:
    NetDev:
      Name: core-bar
      Kind: wireguard
    WireGuard:
      PrivateKeyFile: /etc/wireguard/core/private
      ListenPort: 51802
      RouteTable: "off"
    WireGuardPeer:
      PublicKey: "{{ lookup('ansible.builtin.file', '/tmp/ansible/gate-1.bar.as212024.net/etc/wireguard/core/public') }}"
      AllowedIPs:
        - 0.0.0.0/0
        - "::/0"
      PersistentKeepalive: 60
  15-core-pvl:
    NetDev:
      Name: core-pvl
      Kind: wireguard
    WireGuard:
      PrivateKeyFile: /etc/wireguard/core/private
      ListenPort: 51803
      RouteTable: "off"
    WireGuardPeer:
      PublicKey: "{{ lookup('ansible.builtin.file', '/tmp/ansible/edge-1.pvl.as212024.net/etc/wireguard/core/public') }}"
      AllowedIPs:
        - 0.0.0.0/0
        - "::/0"
      PersistentKeepalive: 60
      Endpoint: "[2a05:f480:1c00:9ee:5400:3ff:fe21:2eeb]:51804"

systemd_networkd_network:
  10-id:
    Match:
      Name: id
    Link:
      RequiredForOnline: true
    Network:
      LinkLocalAddressing: false
      ConfigureWithoutCarrier: true
      Address:
        - 209.112.97.244/32
        - 2001:67c:17fc:ffff::4/128
  10-ul-sbag-0:
    Match:
      Name: ul-sbag-0
    Link:
      RequiredForOnline: true
    Network:
      LinkLocalAddressing: ipv6
      Address:
        - 194.50.92.165/24
        - 2a09:4c0:303:c232::5ca5/64
    Route:
      # Default routes from Securebit
      - Destination: 0.0.0.0/0
        Gateway: 194.50.92.254
      - Destination: "::/0"
        Gateway: 2a09:4c0:303:c232::5cfe
      - Destination: 0.0.0.0/0
        Gateway: 194.50.92.254
        Table: 101
      - Destination: "::/0"
        Gateway: 2a09:4c0:303:c232::5cfe
        Table: 101
      # AS212024 subnets blackholed, more specific routes exist
      - Destination: 209.112.97.0/24
        Gateway: 0.0.0.0
        Type: unreachable
      - Destination: 2001:67c:17fc::/48
        Gateway: "::"
        Type: unreachable
      - Destination: 2a06:e881:7700::/40
        Gateway: "::"
        Type: unreachable
    RoutingPolicyRule:
      # From Securebit IPs
      - From: 194.50.92.165/32
        Table: 101
      - From: 2a09:4c0:303:c232::/64
        Table: 101
      # core VPN
      - To: 136.243.102.29/32
        Table: 101
      - To: 2a01:4f8:171:b0d::1/128
        Table: 101
      - To: 108.61.208.236/32
        Table: 101
      - To: 2a05:f480:1c00:9ee:5400:3ff:fe21:2eeb/128
        Table: 101
  10-ix-decix-0:
    Match:
      Name: ix-decix-0
    Link:
      RequiredForOnline: false
    Network:
      LinkLocalAddressing: ipv6
      IPv6AcceptRA: false
      Address:
        - 80.81.194.242/21
        - 2001:7f8::3:3c3:0:1/64
  10-ix-sbix-1:
    Match:
      Name: ix-sbix-1
    Link:
      RequiredForOnline: false
    Network:
      LinkLocalAddressing: ipv6
      IPv6AcceptRA: false
      Address:
        - 5.196.188.52/25
        - 2001:7f8:d9:3::0003:3c38:4/64
  # core VPN
  15-core-fsn:
    Match:
      Name: core-fsn
    Link:
      RequiredForOnline: false
    Network:
      LinkLocalAddressing: false
      ConfigureWithoutCarrier: true
      Address:
        - 169.254.0.5/31
        - fe80::0:5/127
  15-core-bar:
    Match:
      Name: core-bar
    Link:
      RequiredForOnline: false
    Network:
      LinkLocalAddressing: false
      ConfigureWithoutCarrier: true
      Address:
        - 169.254.0.9/31
        - fe80::0:9/127
  15-core-pvl:
    Match:
      Name: core-pvl
    Link:
      RequiredForOnline: false
    Network:
      LinkLocalAddressing: false
      ConfigureWithoutCarrier: true
      Address:
        - 169.254.0.11/31
        - fe80::0:11/127
