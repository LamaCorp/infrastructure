---
backup_restic_creds_mail: "{{ lookup('community.hashi_vault.hashi_vault', 'restic/data/repositories/' + inventory_hostname + '/mail') }}"

backup_restic_list_raw:
  - name: mail
    enabled: true
    repo_password: "{{ backup_restic_creds_mail['repo_password'] }}"
    backend:
      type: wasabi
      s3_bucket_name: "{{ backup_restic_creds_mail['bucket_name'] }}"
      s3_access_key: "{{ backup_restic_creds_mail['backup_access_key'] }}"
      s3_secret_key: "{{ backup_restic_creds_mail['backup_secret_key'] }}"
      s3_prune_access_key: "{{ backup_restic_creds_mail['prune_access_key'] }}"
      s3_prune_secret_key: "{{ backup_restic_creds_mail['prune_secret_key'] }}"
    to_include:
      - /srv/mailcow
    backup_pre_hooks:
      - cmd:
          - "su"
          - "-"
          - "postgres"
          - "-c"
          - "rm -f /var/lib/postgresql/backup.sql && pg_dumpall --clean --file /var/lib/postgresql/backup.sql --verbose --exclude-database=postgres --exclude-database=template0 --exclude-database=template1"
    backup_systemd_timers:
      minute: 42
      hour: 05
    prune_systemd_timers:
      minute: 24
      hour: 12
