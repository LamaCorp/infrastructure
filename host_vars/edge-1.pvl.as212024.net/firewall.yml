---
nft_define_host:
  bgp interfaces:
    name: bgp_interfaces
    value: "{core-fsn, core-bar, core-fra}"
  bgp neighbors 4:
    name: bgp_neighbors_4
    value: "{169.254.169.254/32}"
  bgp neighbors 6:
    name: bgp_neighbors_6
    value: "{2001:19f0:ffff::1, fd3c:c1c4:bbff:9a64::/64}"
  ospf interfaces:
    name: ospf_interfaces
    value: "{core-fsn, core-bar, core-fra}"

nft_input_host_rules:
  350 dns autoritative:
    - udp dport 53 accept
    - tcp dport 53 accept
  360 ntp:
    - udp dport 123 accept

  550 ppl-cri:
    - udp dport 51821 accept

nft__nat_host_postrouting_rules:
  100 external connectivity:
    - meta oif ul-vultr-0 ip saddr != {108.61.208.236, 209.112.97.0/24} snat to 108.61.208.236
