---
systemd_networkd_link:
  10-ul-vultr-0:
    Match:
      MACAddress: 56:00:03:21:2e:eb
    Link:
      Name: ul-vultr-0

systemd_networkd_netdev:
  # core VPN
  15-core-fsn-4:
    NetDev:
      Name: core-fsn-4
      Kind: wireguard
    WireGuard:
      PrivateKeyFile: /etc/wireguard/core/private
      ListenPort: 51841
      RouteTable: "off"
    WireGuardPeer:
      PublicKey: "{{ lookup('ansible.builtin.file', '/tmp/ansible/nucleus.fsn.as212024.net/etc/wireguard/core/public') }}"
      AllowedIPs:
        - 0.0.0.0/0
        - "::/0"
      PersistentKeepalive: 60
      Endpoint: 136.243.102.29:51843
  15-core-fsn-6:
    NetDev:
      Name: core-fsn-6
      Kind: wireguard
    WireGuard:
      PrivateKeyFile: /etc/wireguard/core/private
      ListenPort: 51861
      RouteTable: "off"
    WireGuardPeer:
      PublicKey: "{{ lookup('ansible.builtin.file', '/tmp/ansible/nucleus.fsn.as212024.net/etc/wireguard/core/public') }}"
      AllowedIPs:
        - 0.0.0.0/0
        - "::/0"
      PersistentKeepalive: 60
      Endpoint: "[2a01:4f8:171:b0d::1]:51863"
  15-core-bar-4:
    NetDev:
      Name: core-bar-4
      Kind: wireguard
    WireGuard:
      PrivateKeyFile: /etc/wireguard/core/private
      ListenPort: 51842
      RouteTable: "off"
    WireGuardPeer:
      PublicKey: "{{ lookup('ansible.builtin.file', '/tmp/ansible/gate-1.bar.as212024.net/etc/wireguard/core/public') }}"
      AllowedIPs:
        - 0.0.0.0/0
        - "::/0"
      PersistentKeepalive: 60
  15-core-bar-6:
    NetDev:
      Name: core-bar-6
      Kind: wireguard
    WireGuard:
      PrivateKeyFile: /etc/wireguard/core/private
      ListenPort: 51862
      RouteTable: "off"
    WireGuardPeer:
      PublicKey: "{{ lookup('ansible.builtin.file', '/tmp/ansible/gate-1.bar.as212024.net/etc/wireguard/core/public') }}"
      AllowedIPs:
        - 0.0.0.0/0
        - "::/0"
      PersistentKeepalive: 60
  15-core-fra-4:
    NetDev:
      Name: core-fra-4
      Kind: wireguard
    WireGuard:
      PrivateKeyFile: /etc/wireguard/core/private
      ListenPort: 51844
      RouteTable: "off"
    WireGuardPeer:
      PublicKey: "{{ lookup('ansible.builtin.file', '/tmp/ansible/edge-2.fra.as212024.net/etc/wireguard/core/public') }}"
      AllowedIPs:
        - 0.0.0.0/0
        - "::/0"
      PersistentKeepalive: 60
      Endpoint: 194.50.92.165:51843
  15-core-fra-6:
    NetDev:
      Name: core-fra-6
      Kind: wireguard
    WireGuard:
      PrivateKeyFile: /etc/wireguard/core/private
      ListenPort: 51864
      RouteTable: "off"
    WireGuardPeer:
      PublicKey: "{{ lookup('ansible.builtin.file', '/tmp/ansible/edge-2.fra.as212024.net/etc/wireguard/core/public') }}"
      AllowedIPs:
        - 0.0.0.0/0
        - "::/0"
      PersistentKeepalive: 60
      Endpoint: "[2a09:4c0:303:c232::5ca5]:51843"
  # private CRI peering
  30-ppl-cri-0:
    NetDev:
      Name: ppl-cri-0
      Kind: wireguard
    WireGuard:
      PrivateKeyFile: /etc/wireguard/cri/private
      ListenPort: 51821
      RouteTable: "off"
    WireGuardPeer:
      # Phowork, AS212270
      - PublicKey: E1EBL3208LQ6xt3NmxSQdkgmrPMH6bjO0tTDdASJPR8=
        AllowedIPs: fd3c:c1c4:bbff:9a64::cafe/128,2a0f:9240:2000::/48,2a0e:b107:f50::/44
        PersistentKeepalive: 60
        Endpoint: "[2001:19f0:6801:7c4:5400:3ff:fe47:7968]:51823"

systemd_networkd_network:
  10-ul-vultr-0:
    Match:
      Name: ul-vultr-0
    Link:
      RequiredForOnline: true
    Network:
      LinkLocalAddressing: ipv6
      IPv6AcceptRA: true
      Address:
        - 108.61.208.236/23
        - 2a05:f480:1c00:9ee::1/64
        - 2a05:f480:1c00:9ee::53/64
        - 2a05:f480:1c00:9ee:5400:3ff:fe21:2eeb/64
    Route:
      # Default routes from Vultr
      - Destination: 0.0.0.0/0
        Gateway: 108.61.208.1
      - Destination: "::/0"
        Gateway: fe80::fc00:3ff:fe21:2eeb # transmitted in RA
      - Destination: 0.0.0.0/0
        Gateway: 108.61.208.1
        Table: 101
      - Destination: "::/0"
        Gateway: fe80::fc00:3ff:fe21:2eeb # transmitted in RA
        Table: 101
      # Needed for reaching Vultr BGP peer
      - Destination: 169.254.0.0/16
        Gateway: 108.61.208.1
        Metric: 100
      # AS212024 subnets blackholed, more specific routes exist
      - Destination: 209.112.97.0/24
        Gateway: 0.0.0.0
        Type: unreachable
      - Destination: 2001:67c:17fc::/48
        Gateway: "::"
        Type: unreachable
      - Destination: 2a06:e881:7700::/40
        Gateway: "::"
        Type: unreachable
    RoutingPolicyRule:
      # From Vultr IPs
      - From: 108.61.208.236/32
        Table: 101
      - From: 2a05:f480:1c00:9ee::/64
        Table: 101
      # core VPN
      - To: 136.243.102.29/32
        Table: 101
      - To: 2a01:4f8:171:b0d::1/128
        Table: 101
      - To: 194.50.92.165/32
        Table: 101
      - To: 2a09:4c0:303:c232::5ca5/128
        Table: 101
      # CRI interco peers
      - To: 2001:19f0:6801:7c4:5400:3ff:fe47:7968/128
        Table: 101
  # core VPN
  15-core-fsn-4:
    Match:
      Name: core-fsn-4
    Link:
      RequiredForOnline: false
    Network:
      LinkLocalAddressing: false
      ConfigureWithoutCarrier: true
      Address:
        - 169.254.4.3/31
        - fe80::4:3/64
  15-core-fsn-6:
    Match:
      Name: core-fsn-6
    Link:
      RequiredForOnline: false
    Network:
      LinkLocalAddressing: false
      ConfigureWithoutCarrier: true
      Address:
        - 169.254.6.3/31
        - fe80::6:3/127
  15-core-bar-4:
    Match:
      Name: core-bar-4
    Link:
      RequiredForOnline: false
    Network:
      LinkLocalAddressing: false
      ConfigureWithoutCarrier: true
      Address:
        - 169.254.4.7/31
        - fe80::4:7/127
  15-core-bar-6:
    Match:
      Name: core-bar-6
    Link:
      RequiredForOnline: false
    Network:
      LinkLocalAddressing: false
      ConfigureWithoutCarrier: true
      Address:
        - 169.254.6.7/31
        - fe80::6:7/127
  15-core-fra-4:
    Match:
      Name: core-fra-4
    Link:
      RequiredForOnline: false
    Network:
      LinkLocalAddressing: false
      ConfigureWithoutCarrier: true
      Address:
        - 169.254.4.10/31
        - fe80::4:10/127
  15-core-fra-6:
    Match:
      Name: core-fra-6
    Link:
      RequiredForOnline: false
    Network:
      LinkLocalAddressing: false
      ConfigureWithoutCarrier: true
      Address:
        - 169.254.6.10/31
        - fe80::6:10/127
  # private CRI peering
  30-ppl-cri-0:
    Match:
      Name: ppl-cri-0
    Link:
      RequiredForOnline: false
    Network:
      Address: fd3c:c1c4:bbff:9a64::ee1/64
      LinkLocalAddressing: ipv6
      ConfigureWithoutCarrier: true
