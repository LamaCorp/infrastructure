#!/usr/bin/env ansible-playbook
---
- name: Base
  import_playbook: base.yml

- name: Unbound
  hosts: core
  roles:
    - aruhier.unbound
  tags:
    - dns
    - unbound

- name: Network (core)
  hosts: core
  tasks:
    - name: Install wireguard
      ansible.builtin.apt:
        name: wireguard
    - name: Create wireguard key folders
      ansible.builtin.file:
        path: "{{ path }}"
        state: directory
        owner: root
        group: systemd-network
        mode: 0750
      loop:
        - /etc/wireguard
        - /etc/wireguard/core
      loop_control:
        loop_var: path

    - name: Generate Wireguard private key
      ansible.builtin.shell: "wg genkey > /etc/wireguard/core/private"
      args:
        creates: /etc/wireguard/core/private
    - name: Generate Wireguard public key
      ansible.builtin.shell: "wg pubkey < /etc/wireguard/core/private > /etc/wireguard/core/public"
      args:
        creates: /etc/wireguard/core/public
    - name: Fetch public keys
      ansible.builtin.fetch:
        src: /etc/wireguard/core/public
        dest: "/tmp/ansible/{{ host }}/etc/wireguard/core/public"
        flat: true
      delegate_to: "{{ host }}"
      loop: "{{ groups['core'] }}"
      loop_control:
        loop_var: host
      changed_when: false
      run_once: true

    - name: Generate Wireguard pre-shared key
      ansible.builtin.shell: "wg genpsk > /etc/wireguard/core/shared"
      args:
        creates: /etc/wireguard/core/shared
      delegate_to: "{{ groups['core'][0] }}"
      run_once: true
    - name: Fetch pre-shared key
      ansible.builtin.slurp:
        src: /etc/wireguard/core/shared
      register: wireguard_core_preshared_key
      delegate_to: "{{ groups['core'][0] }}"
      run_once: true
      no_log: true
    - name: Install pre-shared key
      ansible.builtin.copy:
        content: "{{ wireguard_core_preshared_key['content'] | b64decode }}"
        dest: "/etc/wireguard/core/shared"
        owner: root
        group: systemd-network
        mode: 0640
      no_log: true

    - name: Set keys permissions
      ansible.builtin.file:
        path: "{{ path }}"
        owner: root
        group: systemd-network
        mode: 0640
      loop:
        - /etc/wireguard/core/private
        - /etc/wireguard/core/shared
        - /etc/wireguard/core/public
      loop_control:
        loop_var: path
  tags:
    - network
    - wireguard

- name: Network
  hosts: all
  pre_tasks:
    - name: Ensure /etc/resolv.conf is up-to-date
      ansible.builtin.copy:
        content: |
          {% for ns in network_nameservers %}
          nameserver {{ ns }}
          {% endfor %}
          search .
          options edns0 trust-ad
        dest: /etc/resolv.conf
        owner: root
        group: root
        mode: 0644
      tags:
        - dns
    - name: Ensure hostname is up-to-date
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"
      tags:
        - dns

    - name: Ensure /etc/whois.conf is up-to-date
      ansible.builtin.copy:
        content: |
          .*  {{ whois_server }}
        dest: /etc/whois.conf
        owner: root
        group: root
        mode: 0644
      tags:
        - dns

    - name: Ensure /etc/network/interfaces is empty
      ansible.builtin.copy:
        content: ""
        dest: /etc/network/interfaces
        backup: true
        owner: root
        group: root
        mode: 0644
  roles:
    - systemd_networkd
    - mrlesmithjr.netplan
  tags:
    - netplan
    - network

- name: Firewall
  hosts: all
  pre_tasks:
    - name: Activate IP forwarding
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: true
        sysctl_set: true
        sysctl_file: /etc/sysctl.d/80-network.conf
      loop:
        - key: net.ipv4.conf.all.rp_filter
          value: 0
        - key: net.ipv4.conf.default.rp_filter
          value: 0
        - key: net.ipv4.ip_forward
          value: 1
        - key: net.ipv4.conf.all.forwarding
          value: 1
        - key: net.ipv4.conf.default.forwarding
          value: 1
        - key: net.ipv6.conf.all.forwarding
          value: 1
        - key: net.ipv6.conf.default.forwarding
          value: 1
      tags:
        - sysctl
  roles:
    - ipr-cnrs.nftables
  tags:
    - firewall
    - nftables

- name: Routers
  hosts: core
  roles:
    - role: bird
      tags:
        - bird
    - role: bird_lg_go_proxy
      tags:
        - lg
  tags:
    - router

- name: VPN
  hosts: core
  roles:
    - zerotier
  tags:
    - zerotier
    - vpn
