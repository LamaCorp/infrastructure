---
- name: Create systemd conf folder
  ansible.builtin.file:
    path: "/etc/systemd/networkd.conf.d"
    state: directory
    owner: root
    group: root
    mode: 0755

- name: Ensure systemd-networkd configuration is up-to-date
  ansible.builtin.template:
    src: systemd_networkd.conf.j2
    dest: "/etc/systemd/networkd.conf.d/{{ item.key }}.conf"
    owner: root
    group: systemd-network
    mode: 0640
    trim_blocks: true
    lstrip_blocks: true
  loop: "{{ systemd_networkd_config | dict2items }}"
  notify: Restart systemd-networkd

- name: Ensure systemd-networkd links are up-to-date
  ansible.builtin.template:
    src: systemd_networkd.conf.j2
    dest: "/etc/systemd/network/{{ item.key }}.link"
    owner: root
    group: systemd-network
    mode: 0640
    trim_blocks: true
    lstrip_blocks: true
  loop: "{{ systemd_networkd_link | dict2items }}"
  notify: Restart systemd-networkd

- name: Ensure systemd-networkd netdevs are up-to-date
  ansible.builtin.template:
    src: systemd_networkd.conf.j2
    dest: "/etc/systemd/network/{{ item.key }}.netdev"
    owner: root
    group: systemd-network
    mode: 0640
    trim_blocks: true
    lstrip_blocks: true
  loop: "{{ systemd_networkd_netdev | dict2items }}"
  notify: Reload systemd-networkd

- name: Ensure systemd-networkd networks are up-to-date
  ansible.builtin.template:
    src: systemd_networkd.conf.j2
    dest: "/etc/systemd/network/{{ item.key }}.network"
    owner: root
    group: systemd-network
    mode: 0640
    trim_blocks: true
    lstrip_blocks: true
  loop: "{{ systemd_networkd_network | dict2items }}"
  notify: Reload systemd-networkd

- name: Enable systemd-networkd
  ansible.builtin.service:
    name: systemd-networkd
