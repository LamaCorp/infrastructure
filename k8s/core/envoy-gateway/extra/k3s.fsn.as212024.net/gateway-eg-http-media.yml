---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eg-http-media
spec:
  gatewayClassName: eg
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: eg-http-media
    annotations:
      io.cilium/lb-ipam-ips: 209.112.97.167
      external-dns.alpha.kubernetes.io/hostname: gw-eg-http-media.k3s.fsn.as212024.net
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: lama-corp-space-ecdsa-tls
          - name: lama-corp-space-rsa-tls
