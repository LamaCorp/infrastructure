---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg-http-critical
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg-http-public
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg-http-bar
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg-http-media
  http3: {}
  headers:
    lateResponseHeaders:
      set:
        - name: strict-transport-security
          value: max-age=31536000; includeSubDomains; preload
