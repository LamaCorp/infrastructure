---
kind: Kustomization

commonLabels:
  app.kubernetes.io/name: static

resources:
  - deployment.yml
  - httproute.yml
  - pvc.yml
  - service.yml

configMapGenerator:
  - name: static-config
    files:
      - config/nginx.conf
      - config/default.conf

images:
  - name: docker.io/library/nginx
    newTag: 1.30.0@sha256:0c3a604353135ac13f3a991e2a98c9958af7b8c0b7251ce1590e0c5ff5e3692c
