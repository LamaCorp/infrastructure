---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: services-static
  labels:
    app: services-static
spec:
  project: services
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
  destination:
    name: k3s.fsn.as212024.net
    namespace: services-static
  source:
    repoURL: https://github.com/LamaCorp/infrastructure.git
    targetRevision: HEAD
    path: k8s/services/static/app
