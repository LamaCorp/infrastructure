---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: music-assistant
spec:
  parentRefs:
    - name: eg-http-bar
      namespace: core-eg
      sectionName: https
  hostnames:
    - music.barr.risson.space
  rules:
    - matches:
        - path:
            value: "/"
      backendRefs:
        - name: music-assistant
          port: 8095
