---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: home-assistant-grafana
spec:
  parentRefs:
    - name: eg-http-bar
      namespace: core-eg
      sectionName: https
  hostnames:
    - grafana.phemma.fr
  rules:
    - matches:
        - path:
            value: "/"
      backendRefs:
        - name: home-assistant-grafana
          port: 3000
