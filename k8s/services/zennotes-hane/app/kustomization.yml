---
kind: Kustomization

commonLabels:
  app.kubernetes.io/name: zennotes

resources:
  - deployment.yml
  - httproute.yml
  - pvc.yml
  - secrets.yml
  - service.yml

configMapGenerator:
  - name: zennotes-config-env
    literals:
      - ZENNOTES_BIND=[::]:7878
      - ZENNOTES_ALLOW_INSECURE_NOAUTH=1
      - ZENNOTES_BEHIND_TLS=1
      - ZENNOTES_TRUSTED_PROXIES=2001:67c:17fc:110::/60,172.28.128.0/22

images:
  - name: docker.io/adibhanna/zennotes
    newTag: 2.13.2@sha256:e2f60215b12e5fe12b4d4a8a821406eafcc018d13bf46372398c6e56555438e8
