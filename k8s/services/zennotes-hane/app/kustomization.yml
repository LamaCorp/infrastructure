---
kind: Kustomization

commonLabels:
  app.kubernetes.io/name: zennotes

resources:
  - deployment.yml
  - httproute.yml
  - pvc.yml
  - secrets.yml
  - service.yml

configMapGenerator:
  - name: zennotes-config-env
    literals:
      - ZENNOTES_BIND=[::]:7878
      - ZENNOTES_ALLOW_INSECURE_NOAUTH=1
      - ZENNOTES_BEHIND_TLS=1
      - ZENNOTES_TRUSTED_PROXIES=2001:67c:17fc:110::/60,172.28.128.0/22

images:
  - name: docker.io/adibhanna/zennotes
    newTag: 2.13.5@sha256:482cd813f96d7db93080946f9d3b1187b829fd38c221a1f3bd70f18bb7b40e6c
