---
kind: Kustomization

commonLabels:
  app.kubernetes.io/name: immich

resources:
  - server
  - microservices
  - machine-learning
  - network-policy.yml
  - pvc.yml
  - secrets.yml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: immich-config-env
    literals:
      - DB_HOSTNAME=postgresql.fsn.as212024.net
      - DB_DATABASE_NAME=immich
      - DB_USERNAME_FILE=/postgres-creds/username
      - DB_PASSWORD_FILE=/postgres-creds/password
      - REDIS_HOSTNAME=redis.fsn.as212024.net
      - REDIS_PORT=6386
      - IMMICH_MEDIA_LOCATION=/data
      - IMMICH_CONFIG_FILE=/config/immich.json
      - TZ=Europe/Paris
  - name: immich-config
    files:
      # See https://github.com/immich-app/immich/blob/main/server/src/config.ts
      - ./config/immich.json

images:
  - name: ghcr.io/immich-app/immich-server
    newTag: v3.0.3@sha256:c716dc20f957aafd89fa9d284a2ec63e25c9e2d8d8e87c6197d540a3dce237db
  - name: ghcr.io/immich-app/immich-machine-learning
    newTag: v3.0.3@sha256:d76fe88b69282c09a97eac4f82dafa82cfd77bce274bc742591cde974f87dacb
