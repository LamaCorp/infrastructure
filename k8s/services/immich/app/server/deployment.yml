---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  annotations:
    configmap.reloader.stakater.com/reload: "immich-config-env"
    secret.reloader.stakater.com/reload: "immich-postgres-credentials,immich-config"
spec:
  replicas: 1
  template:
    spec:
      securityContext:
        runAsUser: 10088
        runAsGroup: 10088
        fsGroup: 10088
      containers:
        - name: server
          image: ghcr.io/immich-app/immich-server
          imagePullPolicy: IfNotPresent
          env:
            - name: IMMICH_WORKERS_INCLUDE
              value: "api"
          envFrom:
            - configMapRef:
                name: immich-config-env
          ports:
            - name: http
              containerPort: 2283
              protocol: TCP
          livenessProbe:
            httpGet:
              port: http
              path: /api/server/ping
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              port: http
              path: /api/server/ping
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
            - name: postgres-creds
              mountPath: /postgres-creds
            - name: config
              mountPath: /config
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: immich-data
        - name: postgres-creds
          secret:
            secretName: immich-postgres-credentials
        - name: config
          secret:
            secretName: immich-config
      nodeSelector:
        k8s.as212024.net/role: storage
      tolerations:
        - key: k8s.as212024.net/role
          operator: Equal
          value: storage
          effect: NoExecute
