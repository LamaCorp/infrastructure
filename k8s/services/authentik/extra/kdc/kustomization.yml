---
kind: Kustomization

commonLabels:
  app.kubernetes.io/name: kdc

resources:
  - deployment.yml
  - network-policy.yml
  - pvc.yml
  - secrets.yml
  - service.yml

configMapGenerator:
  - name: kdc-config
    literals:
      - KRB5_REALM=LAMA-CORP.SPACE
      - KRB5_KDC_MASTER_PASSWORD_FILE=/secrets/master-password

images:
  - name: ghcr.io/authentik-labs/krb5
    newTag: 0.2.4@sha256:cbb7ef210802014c811051231e1cbd4c4200e77dd108a4ffc72e4e9fd8af179d
