---
kind: Kustomization

commonLabels:
  app.kubernetes.io/name: kdc

resources:
  - deployment.yml
  - network-policy.yml
  - pvc.yml
  - secrets.yml
  - service.yml

configMapGenerator:
  - name: kdc-config
    literals:
      - KRB5_REALM=LAMA-CORP.SPACE
      - KRB5_KDC_MASTER_PASSWORD_FILE=/secrets/master-password

images:
  - name: ghcr.io/authentik-community/krb5
    newTag: 0.2.3@sha256:3a5d03d47dfff80014f0fc918260c8549c3493f4451aae9d059247e34f80bf41
