---
kind: Kustomization

commonLabels:
  app.kubernetes.io/name: lemmy

resources:
  - network-policy.yml
  - secrets.yml
  - lemmy
  - pictrs
  - lemmy-ui
  - httproute.yml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: lemmy-config
    files:
      - ./config/config.hjson
  - name: pictrs-config
    literals:
      - PICTRS__SERVER__ADDRESS=[::]:8080
      - PICTRS__MEDIA__VIDEO_CODEC=vp9
      - PICTRS__MEDIA__GIF__MAX_WIDTH=256
      - PICTRS__MEDIA__GIF__MAX_HEIGHT=256
      - PICTRS__MEDIA__GIF__MAX_AREA=65536
      - PICTRS__MEDIA__GIF__MAX_FRAME_COUNT=400
      - PICTRS__REPO__TYPE=sled
  - name: lemmy-ui-config
    literals:
      - LEMMY_UI_LEMMY_INTERNAL_HOST=lemmy:80
      - LEMMY_UI_LEMMY_EXTERNAL_HOST=lemmy.lama-corp.space
      - LEMMY_UI_HTTPS=true

images:
  - name: docker.io/dessalines/lemmy
    newTag: 0.19.19@sha256:fbd81038b70d1f694a9cb9057c7cb67ddd0eebfdd974b8216d4d93266614c3ef
  - name: docker.io/dessalines/lemmy-ui
    newTag: 0.19.19@sha256:03e8a064c4d9dd8e8df2c3520998ac9ba90fd7a71af34af7315b2a8c9c6f86a5
  - name: docker.io/asonix/pictrs
    newTag: 0.5.23@sha256:85bb2303fefdc6b47c37ecad55a02810e6d118f8499f250f2d32ace1097a2bdc
