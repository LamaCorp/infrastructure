---
apiVersion: v1
kind: Service
metadata:
  name: teamspeak
  annotations:
    lbipam.cilium.io/sharing-key: teamspeak
    lbipam.cilium.io/sharing-cross-namespace: services-teamspeak-sdlh
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ipFamilyPolicy: RequireDualStack
  ports:
    - name: voice
      port: 9987
      targetPort: voice
      protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: teamspeak-mgmt
  namespace: default
spec:
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 10080
