---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mastodon
spec:
  template:
    spec:
      containers:
        - name: mastodon
          image: ghcr.io/mastodon/mastodon-streaming
          command:
            - node
            - ./streaming
          env:
            - name: BIND
              value: "::"
          ports:
            - name: streaming
              containerPort: 4000
              protocol: TCP
