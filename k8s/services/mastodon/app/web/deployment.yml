---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mastodon
spec:
  template:
    spec:
      containers:
        - name: mastodon
          command:
            - bundle
            - exec
            - puma
            - -C
            - config/puma.rb
          env:
            - name: BIND
              value: "[::]"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
