---
kind: Kustomization

commonLabels:
  app.kubernetes.io/name: netbox

resources:
  - server
  - worker
  - network-policy.yml
  - pvc.yml
  - secrets.yml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: netbox-config
    files:
      - config/configuration.py
  - name: netbox-oauth-custom-pipline
    files:
      - config/custom_pipeline.py

images:
  - name: ghcr.io/netbox-community/netbox
    newTag: v4.6.5@sha256:980b4cba2c53bf806762b890e0d683eb23413330aa1f94f0c06f0cad31603f39
