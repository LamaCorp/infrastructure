---
kind: Kustomization

commonLabels:
  app.kubernetes.io/name: archivebox

resources:
  - deployment.yml
  - httproute.yml
  - network-policy.yml
  - pvc.yml
  - secrets.yml
  - service.yml

configMapGenerator:
  - name: archivebox-config
    literals:
      - PUBLIC_INDEX=True
      - PUBLIC_SNAPSHOTS=True
      - PUBLIC_ADD_VIEW=False
      - REVERSE_PROXY_USER_HEADER=X-authentik-username
      - REVERSE_PROXY_WHITELIST=172.28.128.0/22,2001:67c:17fc:110::/60

images:
  - name: ghcr.io/archivebox/archivebox
    newTag: 0.7.3@sha256:fdf2936192aa1e909b0c3f286f60174efa24078555be4b6b90a07f2cef1d4909
