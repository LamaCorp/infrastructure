---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbittorrent
spec:
  parentRefs:
    - name: eg-http-media
      namespace: core-eg
      sectionName: https
  hostnames:
    - qbittorrent.lama-corp.space
  rules:
    - matches:
        - path:
            value: "/"
      backendRefs:
        - name: qbittorrent
          port: 80
      timeouts:
        request: 60s
        backendRequest: 60s
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: qbittorrent
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: qbittorrent
  oidc:
    provider:
      issuer: https://auth.lama-corp.space/application/o/qbittorrent/
    clientID: qbittorrent
    clientSecret:
      name: qbittorrent-oidc-credentials
    scopes:
      - offline_access
    refreshToken: true
