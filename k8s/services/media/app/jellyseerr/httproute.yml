---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyseerr
spec:
  parentRefs:
    - name: eg-http-media
      namespace: core-eg
      sectionName: https
  hostnames:
    - jellyseerr.lama-corp.space
  rules:
    - matches:
        - path:
            value: "/"
      backendRefs:
        - name: jellyseerr
          port: 80
      timeouts:
        request: 60s
        backendRequest: 60s
