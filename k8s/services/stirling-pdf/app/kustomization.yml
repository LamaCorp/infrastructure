---
kind: Kustomization

commonLabels:
  app.kubernetes.io/name: stirling-pdf

resources:
  - deployment.yml
  - httproute.yml
  - pvc.yml
  - secrets.yml
  - service.yml

configMapGenerator:
  - name: stirling-pdf-config-env
    literals:
      - SYSTEM_DEFAULTLOCALE=fr-FR
      - SYSTEM_GOOGLEVISIBILITY=false
      - SYSTEM_SHOWUPDATE=false

      - UI_APPNAME=PDF
      - UI_HOMEDESCRIPTION=Manipuler vos PDFs avec aisance
      - UI_APPNAMENAVBAR=PDF

      - METRICS_ENABLED=true

      - SECURITY_ENABLELOGIN=false

images:
  - name: docker.io/stirlingtools/stirling-pdf
    newTag: 2.14.2-fat@sha256:aa91c68b85992986302fbdb6735f2c0824e329304e43c814a9b77c9dd0dbe410
