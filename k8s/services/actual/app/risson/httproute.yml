---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: actual
spec:
  parentRefs:
    - name: eg-http-public
      namespace: core-eg
      sectionName: https
  hostnames:
    - budget.risson.space
  rules:
    - matches:
        - path:
            value: "/"
      backendRefs:
        - name: actual
          port: 80
      timeouts:
        request: 60s
        backendRequest: 60s
