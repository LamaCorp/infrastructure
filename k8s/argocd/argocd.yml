---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  labels:
    app: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
  destination:
    name: k3s.fsn.as212024.net
    namespace: argocd
  sources:
    - repoURL: https://github.com/LamaCorp/infrastructure.git
      targetRevision: HEAD
      ref: infrastructure
    - repoURL: oci://ghcr.io/argoproj/argo-helm/argo-cd
      path: .
      targetRevision: 9.5.14@sha256:946953d36c5348e8c60eb2cc0532ccfaaf1b4583844b8076621ba87f8544faf1
      helm:
        releaseName: argocd
        valueFiles:
          - $infrastructure/k8s/argocd/values.yml
    - repoURL: https://github.com/LamaCorp/infrastructure.git
      targetRevision: HEAD
      path: k8s/argocd
