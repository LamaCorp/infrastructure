commonLabels:
  app.kubernetes.io/name: dmarc-report-viewer

resources:
  - deployment.yml
  - httproute.yml
  - network-policy.yml
  - secrets.yml
  - service.yml

configMapGenerator:
  - name: dmarc-report-viewer-config
    literals:
      - IMAP_HOST=mail.lama-corp.space
      - HTTP_SERVER_USER=
      - HTTP_SERVER_PASSWORD=
      - HTTP_SERVER_BINDING=[::]

images:
  - name: ghcr.io/cry-inc/dmarc-report-viewer
    newTag: 2.5.0@sha256:65d892eb08d57fd33987b34f50a60115425ac62447fe9f0a0e8c596601edb7e4
