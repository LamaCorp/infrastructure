---
kind: Kustomization

commonLabels:
  app.kubernetes.io/name: dmarc-report-viewer

resources:
  - deployment.yml
  - httproute.yml
  - network-policy.yml
  - secrets.yml
  - service.yml

configMapGenerator:
  - name: dmarc-report-viewer-config
    literals:
      - IMAP_HOST=mail.lama-corp.space
      - HTTP_SERVER_USER=
      - HTTP_SERVER_PASSWORD=
      - HTTP_SERVER_BINDING=[::]

images:
  - name: ghcr.io/cry-inc/dmarc-report-viewer
    newTag: 2.5.1@sha256:3d7be83a23d8e2f0064e54164fccd5d28fc31f48d2b2f1bb184a1c90319f0642
