    literals:
      - IMAP_HOST=mail.lama-corp.space
      - HTTP_SERVER_USER=
      - HTTP_SERVER_PASSWORD=
      - HTTP_SERVER_BINDING=[::]

images:
  - name: ghcr.io/cry-inc/dmarc-report-viewer
    newTag: 2.6.0@sha256:34068890aedb7fbaaf39b0b5de97f11e0a462f1805d28845f69b1c68d9aabdbb
